name: SSH Server

on: push

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install WireGuard Tools
        run: |
          brew install wireguard-tools

      - name: Configure SSH
        env:
          SSH_PUBKEY: ${{ secrets.SSH_PUBKEY }}
        run: |
          mkdir -p ~/.ssh/
          chmod 700 ~/.ssh/
          
          # 优先从 Secrets 读取公钥，未设置则使用默认值（测试用途）
          if [ -n "$SSH_PUBKEY" ]; then
            echo "$SSH_PUBKEY" > ~/.ssh/authorized_keys
          else
            echo "ssh-rsa  fhlt2008@localhost" > ~/.ssh/authorized_keys
          fi
          
          chmod 600 ~/.ssh/authorized_keys

      - name: Enable SSH Service
        run: |
          sudo systemsetup -setremotelogin on
          sudo systemsetup -getremotelogin

      - name: Setup WireGuard Configuration
        env:
          ADDRESS: ${{ secrets.ADDRESS }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
        run: |
          sudo mkdir -p /etc/wireguard
          
          sudo tee /etc/wireguard/wg0.conf > /dev/null <<EOF
          [Interface]
          Address = $ADDRESS
          PrivateKey = $PRIVATE_KEY

          [Peer]
          Endpoint = $SERVER_IP
          PublicKey = $PUBLIC_KEY
          AllowedIPs = 172.17.20.0/24
          PersistentKeepalive = 25
          EOF
          
          sudo chmod 600 /etc/wireguard/wg0.conf

      - name: Start WireGuard
        run: |
          sudo wg-quick up wg0

      - name: Keep Alive
        run: |
          echo "Services are running. Keeping job alive..."
          for i in $(seq 1 360); do
            echo "[$(date '+%H:%M:%S')] Still running... ($i/360 min)"
            sleep 60
          done
